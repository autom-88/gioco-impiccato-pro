<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hangman Pro</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="game">

    <h1>🎮 Impiccato Pro 🎮</h1>

    <svg height="250" width="200" class="hangman-svg">

        <line x1="10" y1="240" x2="150" y2="240"/>
        <line x1="50" y1="240" x2="50" y2="20"/>
        <line x1="50" y1="20" x2="120" y2="20"/>
        <line x1="120" y1="20" x2="120" y2="40"/>

        <circle id="head" cx="120" cy="60" r="20"/>
        <line id="body" x1="120" y1="80" x2="120" y2="140"/>
        <line id="arm1" x1="120" y1="100" x2="90" y2="120"/>
        <line id="arm2" x1="120" y1="100" x2="150" y2="120"/>
        <line id="leg1" x1="120" y1="140" x2="90" y2="180"/>
        <line id="leg2" x1="120" y1="140" x2="150" y2="180"/>

    </svg>

    <div id="word"></div>

    <div id="attempts"></div>
    <div id="used"></div>

    <div id="keyboard"></div>

    <button onclick="resetGame()">🔁 Nuova Partita 🔁</button>

</div>

<script src="script.js"></script>

</body>
</html>
